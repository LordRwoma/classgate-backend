# ============================================================
# ClassGate - Konfigurasi build untuk Railway (Nixpacks)
# Taruh file ini di ROOT project (sejajar dengan artisan)
# ============================================================

[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.pdo_mysql",
  "php83Extensions.mbstring",
  "php83Extensions.exif",
  "php83Extensions.pcntl",
  "php83Extensions.bcmath",
  "php83Extensions.gd",
  "php83Extensions.zip",
  "php83Packages.composer",
  "nodejs_20"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link || true && php artisan config:cache && php artisan route:cache && php artisan serve --host=0.0.0.0 --port=$PORT"
